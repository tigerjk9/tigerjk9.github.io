<div class="page__footer-wrapper">
  <footer class="page__footer">

    <div class="footer-logo">
      <a href="{{ '/' | relative_url }}" aria-label="블로그 홈으로 이동">
        <img src="/assets/logo.jpg" alt="{{ site.name }} 로고" style="max-width:240px;width:100%;">
      </a>
    </div>

    <p class="page__footer-copyright">&copy; {% assign site_time = site.time | date: '%Y' %}{% if site.footer.since and site_time != site.footer.since %}{{ site.footer.since }} - {% endif %}{{ site_time }} <a href="{{ site.copyright_url | default: site.url }}">{{ site.copyright | default: site.title | escape_once | strip }}</a>.<br>Powered by <a href="https://jekyllrb.com" rel="nofollow">Jekyll</a> &amp; <a href="https://mademistakes.com/work/jekyll-themes/minimal-mistakes/" rel="nofollow">Minimal Mistakes</a>.</p>

  </footer>
</div>
