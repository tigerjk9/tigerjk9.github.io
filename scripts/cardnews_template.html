<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<style>
{{FONT_FACES}}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 1080px; height: 1350px; overflow: hidden; }
body {
  background: #f2f1e9;
  font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
  color: #1c1c1c;
  position: relative;
  word-break: keep-all;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 46px 64px 0;
}
.header .logo img { height: 72px; display: block; }
.header .date { font-size: 30px; font-weight: 700; color: #1c1c1c; letter-spacing: 0.02em; }
.header-rule {
  border: 0; border-top: 2px solid #d8d6c9;
  margin: 26px 64px 0;
}
.headline {
  margin-top: 62px;
  text-align: center;
  line-height: 1.5;
}
.headline .top {
  font-size: 46px; font-weight: 700; color: #161616;
}
.headline .hl {
  display: inline-block;
  margin-top: 10px;
  font-size: 48px; font-weight: 700; color: #161616;
  background: #f8de49;
  padding: 4px 26px 8px;
}
.photo {
  width: 864px; height: 508px;
  margin: 56px auto 0;
  border-radius: 26px;
  overflow: hidden;
  background: #e6e4d8;
}
.photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.quote-panel {
  display: flex; align-items: center; justify-content: center;
  background: #faf6e3;
  border: 2px solid #eee4b8;
  padding: 60px;
}
.quote-panel span {
  font-size: 52px; font-weight: 700; color: #3a3830;
  text-align: center; line-height: 1.6;
}
.divider {
  border: 0; border-top: 2px solid #d8d6c9;
  width: 812px; margin: 58px auto 0;
}
.body-copy {
  margin-top: 46px;
  text-align: center;
  font-size: 35px; font-weight: 500; color: #2c2c2a;
  line-height: 1.7;
}
.divider2 { margin-top: 46px; }
.footer {
  position: absolute; left: 0; right: 0; bottom: 56px;
  padding: 0 64px;
  text-align: center;
  font-size: 26px; font-weight: 500; color: #8e8d84;
}
.footer .page {
  position: absolute; right: 64px; top: 0;
  color: #7f7e76;
}
</style>
</head>
<body>
  <div class="header">
    <span class="logo"><img src="logo.png" alt="Dot Connector"></span>
    <span class="date">{{DATE}}</span>
  </div>
  <hr class="header-rule">

  <div class="headline">
    <div class="top">{{HEADLINE_TOP}}</div>
    <span class="hl">{{HEADLINE_HL}}</span>
  </div>

  {{IMAGE_BLOCK}}

  <hr class="divider">
  <div class="body-copy">{{BODY1}}<br>{{BODY2}}</div>
  <hr class="divider divider2">

  <div class="footer">
    <span>{{FOOTER_NOTE}}</span>
    <span class="page">{{PAGE}}</span>
  </div>
</body>
</html>
